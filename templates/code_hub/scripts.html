function getTrans() {
    return ideTranslations[localStorage.getItem('lang') || 'ar'];
}

function applyIdeTranslations() {
    const lang = localStorage.getItem('lang') || 'ar';
    const t = ideTranslations[lang];

    document.querySelectorAll('[data-i18n-ide]').forEach(el => {
        const key = el.getAttribute('data-i18n-ide');
        if (t[key]) {
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = t[key];
            else el.innerHTML = t[key];
        }
    });

    updateCardsContent('model-list-container', 'models', t.models);
    updateCardsContent('tool-list-container', 'tools', t.tools);

    // ── Welcome message — skip if V2 mode is active (V2 sets its own) ──
    if (currentVersion === 'v2') return;

    const welcomeContainer = document.getElementById('welcome-message-container');
    if (chatHistory.length === 0 && welcomeContainer) {
        welcomeContainer.innerHTML = `
            <div class="msg-bubble msg-ai" style="width:100%">
                <div class="p-6 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-2xl shadow-lg">
                    <h2 class="text-xl font-bold mb-2">${t.welcome_title}</h2>
                    <p class="opacity-90 text-sm">${t.welcome_desc}</p>
                </div>
            </div>`;
    }
}

function updateCardsContent(containerId, type, dataObj) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.querySelectorAll('.option-card').forEach(card => {
        const m = (card.getAttribute('onclick') || '').match(/selectItem\('[^']+',\s*'([^']+)'/);
        if (m && dataObj[m[1]]) {
            const info = dataObj[m[1]];
            const nameEl = card.querySelector('.font-bold');
            if (nameEl) nameEl.innerText = info.name;
            const descEl = card.querySelector('.text-xs, .text-sm.text-gray-500');
            if (descEl) descEl.innerText = info.desc;
        }
    });
}

function selectMode(mode, isManual) {
    currentMode = mode;
    if (isManual !== undefined) window._manualModeSet = isManual;

    const icons    = { auto: 'fa-wand-magic-sparkles', build: 'fa-hammer', chat: 'fa-comments' };
    const lang     = localStorage.getItem('lang') || 'ar';
    const t        = getTrans();
    const labelsKey = { auto: 'mode_auto', build: 'mode_build', chat: 'mode_chat' };

    // Header mode button
    const hi = document.getElementById('header-mode-icon');
    const hl = document.getElementById('header-mode-label');
    const hb = document.getElementById('header-mode-btn');
    const hd = document.getElementById('header-mode-dropdown');
    if (hi) hi.className = 'fa-solid ' + icons[mode];
    if (hl) hl.textContent = t[labelsKey[mode]] || mode;
    if (hb) hb.className = 'header-mode-btn' + (mode === 'build' ? ' mode-build' : mode === 'chat' ? ' mode-chat' : '');
    if (hd) hd.classList.remove('show');

    // Update active state in dropdown options
    ['auto', 'build', 'chat'].forEach(m => {
        const opt = document.getElementById('hmode-opt-' + m);
        if (opt) opt.classList.toggle('active', m === mode);
    });

    // Update placeholder
    const input = document.getElementById('prompt-input');
    if (input) {
        if (currentVersion === 'v2') {
            input.placeholder = t.input_placeholder_v2;
        } else if (mode === 'build') {
            input.placeholder = lang === 'ar' ? 'اطلب من Orgteh بناء مشروع...' : 'Ask Orgteh to build something...';
        } else if (mode === 'chat') {
            input.placeholder = lang === 'ar' ? 'استفسر أو اطرح سؤالك...' : 'Ask a question or discuss...';
        } else {
            input.placeholder = t.input_placeholder;
        }
    }
}

document.addEventListener('click', function(evt) {

    if (hd) hd.classList.remove('show');
    const vd = document.getElementById('ver-dropdown');
    if (vd) vd.classList.remove('show');
    const modeWrapper = document.querySelector('.mode-toggle-wrapper');
    if (modeWrapper && !modeWrapper.contains(evt.target)) {
        const dd = document.getElementById('mode-dropdown');
        if (dd) dd.classList.remove('show');

/** Reload page with ?mode= param — single source of truth */
window.switchVersion = function(v) {
    const url  = new URL(window.location.href);
    const mode = (v === 'v2') ? 'agent' : 'classic';
    if (url.searchParams.get('mode') === mode) { window.closeVerDropdown(); return; }
    url.searchParams.set('mode', mode);
    window.location.href = url.toString();
};

window.toggleVerDropdown = function(ev) {
    ev.stopPropagation();
    const d = document.getElementById('ver-dropdown');
    if (d) d.classList.toggle('show');
};
window.closeVerDropdown = function() {
    const d = document.getElementById('ver-dropdown');
    if (d) d.classList.remove('show');
};

async function sendMessage() {
    // Redirect to V2 handler if in agent mode
    if (currentVersion === 'v2') {
        return _sendMessageV2();
    }

    const input     = document.getElementById('prompt-input');
    const fileInput = document.getElementById('file-input');
    let text = input.value.trim();
    if (!text && fileInput.files.length === 0) return;
    if (window.event) window.event.preventDefault();

    const t = getTrans();
    let resolvedMode = currentMode;

    if (window._pendingFileContext) {
        const fc = window._pendingFileContext;
        text = text + '\n\n[File context: ' + fc.name + ']\n' + fc.content;
        resolvedMode = 'chat';
        clearFloatingChipSilent();
    }

    let displayMsg = input.value.trim().replace(/\n/g, '<br>');
    if (fileInput.files.length > 0) {
        displayMsg += `<div class="text-xs opacity-70 mt-1"><i class="fa-solid fa-paperclip"></i> ${fileInput.files.length} ${t.file_attached}</div>`;
    }

    addMessageUI('user', displayMsg);
    chatHistory.push({ role: 'user', content: text });
    input.value = ''; input.style.height = 'auto';
    filesBuffer = {};
    isPreviewDirty = true;
    switchView('chat');

    if (resolvedMode === 'chat') {
        await handleChatStream(text, fileInput.files);
    } else {
        await handleV1Stream(text, fileInput.files, resolvedMode);
    }

    fileInput.value = '';
    updateFileBadge();
    if (typeof window._scheduleV1Save === 'function') window._scheduleV1Save();
}

async function handleV1Stream(text, files, mode) {
    mode = mode || 'build';
    const feed = document.getElementById('chat-container');
    const t    = getTrans();

    const formData = new FormData();
    formData.append('instruction', text);
    const targetModel = selectedItems.models.length > 0 ? selectedItems.models[0] : '';
    formData.append('target_model', targetModel);
    formData.append('target_tools', selectedItems.tools.join(','));
    formData.append('chat_history', JSON.stringify(chatHistory));
    formData.append('current_files', JSON.stringify(currentFiles));
    formData.append('chat_mode', mode);
    for (let i = 0; i < files.length; i++) formData.append('files', files[i]);

    const row = document.createElement('div');
    row.className = 'msg-row ai v1-msg-row';
    row.innerHTML =
        '<div class="msg-bubble msg-ai" style="width:100%">' +
            '<div class="thinking-wrapper open">' +
                '<div class="thinking-header" onclick="toggleThinking(this)">' +
                    '<i class="fa-solid fa-circle-notch fa-spin"></i> ' + t.thinking_process +
                '</div>' +
                '<div class="thinking-body"></div>' +
            '</div>' +
            '<div class="progress-container hidden"><div class="progress-track"><div class="progress-fill"></div></div></div>' +
            '<div class="file-artifacts mt-2 pl-1"></div>' +
            '<div class="chat-response-bubble" style="display:none;"></div>' +
        '</div>';
    feed.appendChild(row);
    feed.scrollTop = feed.scrollHeight;

    const thinkWrapper = row.querySelector('.thinking-wrapper');
    const thinkHeader  = row.querySelector('.thinking-header');
    const thinkBody    = row.querySelector('.thinking-body');
    const progressBox  = row.querySelector('.progress-container');
    const progressFill = row.querySelector('.progress-fill');
    const chatBubble   = row.querySelector('.chat-response-bubble');

    let fullText = '', thinkingDone = false, renderPath = null;

    function markThinkingDone() {
        if (thinkingDone) return;
        thinkingDone = true;
        thinkWrapper.classList.add('done');
        thinkWrapper.classList.remove('open');
        thinkHeader.innerHTML = '<i class="fa-solid fa-circle-check text-green-500"></i> ' + t.thinking_finished;
    }

    try {
        const response = await fetch('/api/process-code', { method: 'POST', body: formData });
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();

            for (const line of lines) {
                if (!line.trim()) continue;
                let data;
                try { data = JSON.parse(line); } catch { continue; }

                if (data.type === 'thinking') { thinkBody.innerText += data.content; feed.scrollTop = feed.scrollHeight; continue; }
                if (data.type !== 'code') continue;

                fullText += data.content;

                // ── اكتشاف مسار العرض: نتحقق في كل chunk حتى لا نعرض ### خاماً ──
                if (renderPath === null || renderPath === 'chat') {
                    const trimmed = fullText.trimStart();
                    const hasBuildMarker = mode === 'build' || trimmed.includes('###');
                    if (hasBuildMarker) {
                        if (renderPath === 'chat') {
                            // تحويل من chat إلى build — نخفي الفقاعة الخاطئة
                            chatBubble.style.display = 'none';
                            chatBubble.innerHTML = '';
                        }
                        renderPath = 'build';
                        markThinkingDone();
                        progressBox.classList.remove('hidden');
                    } else if (renderPath === null && fullText.length > 60) {
                        // نتأكد بعد 60 حرف أنه ليس build
                        renderPath = 'chat';
                        markThinkingDone();
                        chatBubble.style.display = 'block';
                    }
                }

                if (renderPath === 'chat') {
                    chatBubble.innerHTML = chatMarkdown(fullText);
                } else if (renderPath === 'build') {
                    progressFill.style.width = Math.min(30 + (fullText.length / 100), 95) + '%';
                }
                feed.scrollTop = feed.scrollHeight;
            }
        }

        markThinkingDone();
        const _thinkingText = thinkBody.innerText || '';

        if (renderPath === 'build' || (mode === 'build' && renderPath === null)) {
            progressFill.style.width = '100%';
            if (fullText.trim()) {
                const newFiles = parseFilesStrict(fullText);
                if (Object.keys(newFiles).length > 0) {
                    Object.assign(currentFiles, newFiles);
                    updateCurrentPreviewFile(newFiles);
                    chatHistory.push({ role: 'assistant', content: fullText, thinking: _thinkingText });
                    Object.keys(newFiles).forEach(f => renderArtifactBadge(row, f));
                    renderDownloadAllBtn(row);
                    isPreviewDirty = false;
                    renderPreview(currentPreviewFile);
                    if (window.addRunButton) window.addRunButton(row, newFiles);
                    // ── حفظ الدورة الكاملة في Telegram ──
                    _saveTurnToTelegram(text, files, _thinkingText, fullText, mode, Object.keys(newFiles));
                } else {
                    chatBubble.style.display = 'block';
                    chatBubble.innerHTML = chatMarkdown(fullText);
                    chatHistory.push({ role: 'assistant', content: fullText, thinking: _thinkingText });
                    progressBox.classList.add('hidden');
                    _saveTurnToTelegram(text, files, _thinkingText, fullText, mode, []);
                }
            }
        } else {
            if (fullText.trim()) {
                chatBubble.style.display = 'block';
                chatBubble.innerHTML = chatMarkdown(fullText);
                chatHistory.push({ role: 'assistant', content: fullText, thinking: _thinkingText });
                _saveTurnToTelegram(text, files, _thinkingText, fullText, mode, []);
            }
        }
    } catch(e) {
        markThinkingDone();
        chatBubble.style.display = 'block';
        chatBubble.innerHTML = '<span style="color:#ef4444">Error: ' + e.message + '</span>';
    }
}

    const row = document.createElement('div');
    row.className = 'msg-row ai';

    formData.append('chat_history', JSON.stringify(chatHistory));

    formData.append('chat_mode', forceMode || 'chat');
    for (const f of files) formData.append('files', f);

    let fullText = '', thinkingDone = false;

    try {
        const response = await fetch('/api/process-code', { method: 'POST', body: formData });
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();
            for (const line of lines) {
                if (!line.trim()) continue;
                try {
                    const data = JSON.parse(line);
                    if (data.type === 'thinking') {
                        thinkBody.innerText += data.content;
                        feed.scrollTop = feed.scrollHeight;

function parseFilesStrict(text) {
    const cleanText = text.replace(/```\w*\n/g, '').replace(/```/g, '');
    const regex = /###\s*([\w\.\-\/]+)(?:\s*###)?\s*\n([\s\S]*?)(?=###\s*[\w\.\-\/]|$)/g;
    let match, files = {};
    while ((match = regex.exec(cleanText)) !== null) {
        const name = match[1].trim(), content = match[2].trim();
        if (name && content) files[name] = content;
    }
    return files;
}

function updateCurrentPreviewFile(newFiles) {
    const allHtml = Object.keys(currentFiles).filter(f => f.endsWith('.html'));
    if (!allHtml.length) return;
    const newHtml = Object.keys(newFiles).filter(f => f.endsWith('.html'));
    const pool = newHtml.length > 0 ? newHtml : allHtml;
    const best = pool.find(f => f.replace(/.*\//, '').toLowerCase() === 'index.html')
        || pool.find(f => f.toLowerCase().includes('index'))
        || pool[0];
    if (best) currentPreviewFile = best;
}

function chatMarkdown(text) {
    let html = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        '<pre><code>' + code.trim().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code></pre>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\n/g, '<br>');
    return html;
}

function cleanCodeFence(content) {
    if (!content) return '';
    const match = content.match(/```(?:\w+)?\s*([\s\S]*?)\s*```/);
    return (match && match[1]) ? match[1].trim() : content.replace(/^```[a-z]*\n/i, '').replace(/```$/, '').trim();
}

function navigateVirtualPage(targetFile) {
    if (currentFiles[targetFile]) {
        currentPreviewFile = targetFile;
        renderPreview(targetFile);
    } else {
        const fallback = Object.keys(currentFiles).find(f => f.endsWith(targetFile) || targetFile.endsWith(f));
        if (fallback) { currentPreviewFile = fallback; renderPreview(fallback); }
    }
}
window.navigateVirtualPage = navigateVirtualPage;

// Listen for messages from the preview iframe (postMessage, sandbox-safe)
window.addEventListener('message', function(e) {
    if (!e.data || !e.data.type) return;

    // [1] Navigation: iframe anchor click → switch to that virtual file
    if (e.data.type === 'orgteh_nav' && e.data.file) {
        navigateVirtualPage(e.data.file);
        return;
    }

    // [2] Fetch bridge: iframe fetch() → parent makes the real request (no CORS)
    // NOTE: e.source is null for srcdoc iframes in Chrome mobile — use frame.contentWindow directly
    if (e.data.type === 'orgteh_fetch_req') {
        var reqId  = e.data.id;
        var frameWin = (document.getElementById('preview-frame') || {}).contentWindow;
        if (!frameWin) return;
        var fetchOpts = { method: e.data.method || 'GET', headers: e.data.headers || {} };
        if (e.data.body) fetchOpts.body = e.data.body;
        fetch(e.data.url, fetchOpts)
            .then(function(r) { return r.json().then(function(b){ return {status:r.status,body:b}; }); })
            .then(function(d) {
                try { frameWin.postMessage({type:'orgteh_fetch_res',id:reqId,status:d.status,body:d.body}, '*'); } catch(_){}
            })
            .catch(function(err) {
                try { frameWin.postMessage({type:'orgteh_fetch_res',id:reqId,err:err.message||String(err)}, '*'); } catch(_){}
            });
        return;
    }
});

            const s = this.selectionStart, end = this.selectionEnd;

function renderPreview(targetFilename) {
    targetFilename = targetFilename || 'index.html';
    const frame = document.getElementById('preview-frame');
    const empty = document.getElementById('preview-empty');

    if (Object.keys(currentFiles).length === 0) {
        frame.style.display = 'none'; empty.style.display = 'flex'; return;
    }

    let htmlFileName = targetFilename;
    if (!currentFiles[htmlFileName] && targetFilename === 'index.html') {
        htmlFileName = Object.keys(currentFiles).find(f => f.endsWith('.html') && (f.includes('index') || f.includes('home')))
            || Object.keys(currentFiles).find(f => f.endsWith('.html'));
    }

    if (!htmlFileName || !currentFiles[htmlFileName]) {
        frame.style.display = 'block'; empty.style.display = 'none';
        const doc = frame.contentWindow.document;
        doc.open(); doc.write(`<div style="font-family:system-ui;text-align:center;padding:50px;color:#666;"><h2>404 Not Found</h2><p>File '<b>${targetFilename}</b>' does not exist.</p></div>`); doc.close();
        return;
    }

    let html = cleanCodeFence(currentFiles[htmlFileName]);

    Object.keys(currentFiles).forEach(fname => {
        if (fname === htmlFileName) return;
        const content  = cleanCodeFence(currentFiles[fname]);
        const baseName = fname.includes('/') ? fname.split('/').pop() : fname;

        if (fname.endsWith('.css')) {
            const ref = html.includes(fname) ? fname : (html.includes(baseName) ? baseName : null);
            if (ref) {
                const re = new RegExp(`<link[^>]+href=["']${ref.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}["'][^>]*>`, 'i');
                html = re.test(html) ? html.replace(re, `<style>\n${content}\n</style>`) : html.replace('</head>', `<style>\n${content}\n</style></head>`);
            } else {
                html = html.replace('</head>', `<style>\n${content}\n</style></head>`);
            }
        }

        if (fname.endsWith('.js')) {
            const ref = html.includes(fname) ? fname : (html.includes(baseName) ? baseName : null);
            if (ref) {
                const re = new RegExp(`<script[^>]+src=["']${ref.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}["'][^>]*>[\\s\\S]*?<\\/script>`, 'i');
                html = re.test(html) ? html.replace(re, `<script>\n${content}\n<\/script>`) : html.replace('</body>', `<script>\n${content}\n<\/script></body>`);
            } else {
                html = html.replace('</body>', `<script>\n${content}\n<\/script></body>`);
            }
        }
    });

    // ── [1] Navigation interceptor (link clicks → parent postMessage) ──
    const navInterceptor = `<script>(function(){var _i=function(){document.addEventListener('click',function(e){var el=e.target;for(var i=0;i<5;i++){if(!el||el===document)break;if(el.tagName==='A'){var h=el.getAttribute('href');if(h&&h!==''&&!h.startsWith('http')&&!h.startsWith('//')&&!h.startsWith('#')&&!h.startsWith('mailto')&&!h.startsWith('javascript')){e.preventDefault();e.stopImmediatePropagation();try{window.parent.postMessage({type:'orgteh_nav',file:h},'*');}catch(_){}}break;}el=el.parentElement;}},true);};if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',_i);}else{_i();}})();<\/script>`;

    // ── [2] Fetch bridge — intercepts ALL fetch() calls inside the iframe that target
    //        orgteh.com (or relative /v1/ /api/ paths) and tunnels them through the
    //        parent page via postMessage.  The parent page is SAME-ORIGIN with the
    //        server so there is zero CORS.
    //        Fix: e.source is null for srcdoc iframes in Chrome mobile, so the parent
    //        listener uses frame.contentWindow directly (see message listener below).
    const fetchBridge = `<script>(function(){
// ── Orgteh Preview Proxy Bridge ──────────────────────────────────────────
// Intercepts fetch() calls targeting the Orgteh AI API and rewrites them to
// use /api/preview-proxy — a CORS-safe endpoint that accepts api_key in the
// JSON body (no Authorization header = no credentials = ACAO:* works fine).
var _pend={};

function _proxyFetch(us, opts) {
  return new Promise(function(res, rej) {
    var id = 'f' + Math.random().toString(36).slice(2);
    _pend[id] = {res: res, rej: rej};
    setTimeout(function() {
      if (_pend[id]) { delete _pend[id]; rej(new Error('timeout')); }
    }, 20000);
    // Extract api_key from Authorization header, move it to the body
    var authHeader = (opts && opts.headers && (
      opts.headers['Authorization'] || opts.headers['authorization'] || ''
    )) || '';
    var apiKey = authHeader.replace(/^Bearer\s+/i, '').trim();
    var bodyObj = {};
    try { bodyObj = JSON.parse(opts && opts.body ? opts.body : '{}'); } catch(_) {}
    if (apiKey) bodyObj.api_key = apiKey;
    bodyObj.stream = false;  // proxy always returns non-streaming
    // Rewrite to /api/preview-proxy — same domain, no CORS complications
    fetch('/api/preview-proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(bodyObj)
    }).then(function(r) {
      return r.json().then(function(b) {
        _pend[id] && _pend[id].res(new Response(JSON.stringify(b), {
          status: r.status,
          headers: { 'Content-Type': 'application/json' }
        }));
        delete _pend[id];
      });
    }).catch(function(e) {
      _pend[id] && _pend[id].rej(e);
      delete _pend[id];
    });
  });
}

function _installBridge() {
  var _orig = window.fetch.bind(window);
  window.fetch = function(url, opts) {
    var us = typeof url === 'string' ? url : ((url && url.url) || String(url));
    // Intercept any Orgteh AI API call
    if (us.indexOf('orgteh.com') !== -1 || us.startsWith('/v1/') || us.startsWith('/api/chat')) {
      return _proxyFetch(us, opts);
    }
    return _orig(url, opts);
  };
}

_installBridge();
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', _installBridge);
}
})();<\/script>`;

    const _allInjected = navInterceptor + fetchBridge;
    if (html.includes('<head>')) html = html.replace('<head>', '<head>' + _allInjected);
    else if (html.includes('<html')) html = html.replace(/(<html[^>]*>)/i, '$1' + _allInjected);
    else html = _allInjected + html;

    frame.srcdoc = html;
    frame.style.display = 'block'; empty.style.display = 'none';
}

function switchView(view) {
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + view)?.classList.add('active');

    document.getElementById('tab-chat')?.classList.toggle('active', view === 'chat');
    document.getElementById('tab-preview')?.classList.toggle('active', view === 'preview');

    const inputRow = document.getElementById('main-input-row');
    const bottomControls = document.querySelector('.bottom-controls-layer');

    if (view === 'preview') {
        inputRow?.classList.add('hidden');
        document.body.classList.add('preview-active');
        if (bottomControls) bottomControls.style.display = 'none';
        showPreviewNav();
        if (isPreviewDirty || Object.keys(currentFiles).length > 0) { renderPreview(currentPreviewFile); isPreviewDirty = false; }
    } else {
        inputRow?.classList.remove('hidden');
        document.body.classList.remove('preview-active');
        if (bottomControls) bottomControls.style.display = '';
        hidePreviewNav();
    }
}

function showPreviewNav() {
    let pNav = document.getElementById('preview-nav-bar');
    if (!pNav) {
        pNav = document.createElement('div');
        pNav.id = 'preview-nav-bar';
        pNav.style.cssText = 'direction:ltr;position:fixed;bottom:0;left:0;right:0;z-index:9999;display:flex;justify-content:center;padding:10px 16px 16px;background:linear-gradient(to top,var(--bg-body) 70%,transparent);transition:opacity 0.3s ease;';
        const t = getTrans();
        pNav.innerHTML = `
            <div class="nav-container" style="pointer-events:auto;">
                <div onclick="togglePreviewNavVisibility()" class="visibility-btn" id="preview-visibility-btn">
                    <i id="eye-icon-preview" class="fa-solid fa-eye-slash"></i>
                </div>
                <div class="tab-pill" id="preview-tab-pill">
                    <div onclick="switchView('chat')" id="preview-tab-chat" class="tab-item"><span>${t.tab_chat}</span></div>
                    <div onclick="switchView('preview')" id="preview-tab-preview" class="tab-item active"><span>${t.tab_preview}</span></div>
                </div>
                <button onclick="renderPreview(currentPreviewFile)" class="preview-refresh-btn" id="preview-refresh-btn">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
                <button onclick="openSpecificModal('main-menu-modal')" class="action-btn model-trigger" id="preview-menu-btn">
                    <i class="fa-solid fa-ellipsis"></i>
                </button>
            </div>`;
        document.body.appendChild(pNav);
    } else {
        document.getElementById('preview-tab-chat')?.classList.remove('active');
        document.getElementById('preview-tab-preview')?.classList.add('active');
        pNav.style.display = 'flex';
    }
}

function togglePreviewNavVisibility() {
    const pill = document.getElementById('preview-tab-pill');
    const menuBtn = document.getElementById('preview-menu-btn');
    const refreshBtn = document.getElementById('preview-refresh-btn');
    const eyeIcon = document.getElementById('eye-icon-preview');
    const isHidden = pill && pill.style.display === 'none';
    [pill, menuBtn, refreshBtn].forEach(el => { if (el) el.style.display = isHidden ? '' : 'none'; });
    if (eyeIcon) eyeIcon.className = isHidden ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
}

function hidePreviewNav() {
    const pNav = document.getElementById('preview-nav-bar');
    if (pNav) pNav.style.display = 'none';
}

function toggleNavVisibility() {
    const nav = document.getElementById('nav-container');
    if (nav) {
        nav.classList.toggle('minimized');
        document.getElementById('eye-icon').className = nav.classList.contains('minimized') ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
    }
}

function openSpecificModal(id) { document.getElementById(id)?.classList.add('open'); }
function closeSpecificModal(id) { document.getElementById(id)?.classList.remove('open'); }
function switchModal(c, o) { closeSpecificModal(c); setTimeout(() => openSpecificModal(o), 100); }

function openGitHubDeployModal() {
    const modal = document.getElementById('github-deploy-modal');
    if (!modal) return;
    ['gh-not-connected','gh-no-files','gh-deploy-form','gh-import-form','gh-loading','gh-success'].forEach(id => document.getElementById(id)?.classList.add('hidden'));
    switchGhTab('deploy');
    const repoInput = document.getElementById('gh-repo-name');
    if (repoInput && !repoInput.value) repoInput.value = 'orgteh-project-' + Date.now().toString(36);
    fetch('/api/github/status').then(r => r.json()).then(data => {
        if (data.connected) {
            if (!Object.keys(currentFiles).length) { document.getElementById('gh-no-files')?.classList.remove('hidden'); }
            else {
                const list = document.getElementById('gh-files-list');
                if (list) list.innerHTML = Object.keys(currentFiles).map(f => `<li class="flex items-center gap-2"><i class="fas fa-file-code text-indigo-500"></i> ${f}</li>`).join('');
                document.getElementById('gh-deploy-form')?.classList.remove('hidden');
            }
        } else { document.getElementById('gh-not-connected')?.classList.remove('hidden'); }
    }).catch(() => document.getElementById('gh-not-connected')?.classList.remove('hidden'));
    openSpecificModal('github-deploy-modal');
}

function switchGhTab(tab) {
    const dBtn = document.getElementById('gh-tab-deploy'), iBtn = document.getElementById('gh-tab-import');
    const dForm = document.getElementById('gh-deploy-form'), iForm = document.getElementById('gh-import-form');
    const noFiles = document.getElementById('gh-no-files');
    if (tab === 'deploy') {
        if (dBtn) { dBtn.style.background='var(--bg-card)'; dBtn.style.color='var(--text-primary)'; }
        if (iBtn) { iBtn.style.background='transparent'; iBtn.style.color='var(--text-secondary)'; }
        iForm?.classList.add('hidden');
        if (Object.keys(currentFiles).length) { dForm?.classList.remove('hidden'); noFiles?.classList.add('hidden'); }
        else { dForm?.classList.add('hidden'); noFiles?.classList.remove('hidden'); }
    } else {
        if (iBtn) { iBtn.style.background='var(--bg-card)'; iBtn.style.color='var(--text-primary)'; }
        if (dBtn) { dBtn.style.background='transparent'; dBtn.style.color='var(--text-secondary)'; }
        dForm?.classList.add('hidden'); noFiles?.classList.add('hidden'); iForm?.classList.remove('hidden');
    }
}

async function executeGitHubImport() {
    const repoUrl = document.getElementById('gh-import-url')?.value.trim();
    if (!repoUrl) { alert(localStorage.getItem('lang')==='ar' ? 'يرجى إدخال رابط المستودع' : 'Please enter a repository URL'); return; }
    document.getElementById('gh-import-form')?.classList.add('hidden');
    document.getElementById('gh-loading')?.classList.remove('hidden');
    const loadingTitle = document.getElementById('gh-loading-title');
    const statusEl = document.getElementById('gh-status-text');
    if (loadingTitle) loadingTitle.textContent = localStorage.getItem('lang')==='ar' ? 'جاري الاستيراد...' : 'Importing...';
    if (statusEl) statusEl.textContent = localStorage.getItem('lang')==='ar' ? 'جلب الملفات من GitHub' : 'Fetching files from GitHub';
    try {
        const res = await fetch('/api/import/github', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ repo_url: repoUrl, branch: document.getElementById('gh-import-branch')?.value.trim()||'main' }) });
        const result = await res.json();
        document.getElementById('gh-loading')?.classList.add('hidden');
        if (result.success && result.files) {
            Object.assign(currentFiles, result.files);
            isPreviewDirty = true;
            closeSpecificModal('github-deploy-modal');
            addMessageUI('ai', `<div style="padding:12px 16px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;"><div style="font-weight:bold;margin-bottom:6px;color:#22c55e;"><i class="fab fa-github mr-2"></i> ${localStorage.getItem('lang')==='ar'?'تم الاستيراد بنجاح!':'Import successful!'}</div><div style="font-size:0.85rem;color:var(--text-secondary);">${Object.keys(result.files).length} files from <code>${repoUrl}</code></div></div>`);
            if (Object.keys(result.files).some(f => f.endsWith('.html'))) renderPreview('index.html');
        } else { throw new Error(result.error || 'Failed'); }
    } catch(error) {
        document.getElementById('gh-loading')?.classList.add('hidden');
        document.getElementById('gh-import-form')?.classList.remove('hidden');
        alert('Error: ' + error.message);
    }
}

async function executeGitHubDeploy() {
    const repoName = document.getElementById('gh-repo-name').value.trim();
    if (!repoName) { alert(localStorage.getItem('lang')==='ar' ? 'يرجى إدخال اسم المستودع' : 'Please enter a repository name'); return; }
    const filesArr = Object.entries(currentFiles).map(([path, content]) => ({ path, content }));
    document.getElementById('gh-deploy-form')?.classList.add('hidden');
    document.getElementById('gh-loading')?.classList.remove('hidden');
    try {
        const statusEl = document.getElementById('gh-status-text');
        if (statusEl) statusEl.textContent = localStorage.getItem('lang')==='ar' ? 'إنشاء المستودع...' : 'Creating repository...';
        const res = await fetch('/api/deploy/github', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ repo_name:repoName, description:document.getElementById('gh-repo-desc')?.value||'Generated by Orgteh Infra', is_private:document.getElementById('gh-private')?.checked||false, enable_pages:document.getElementById('gh-pages')?.checked||true, files:filesArr }) });
        const result = await res.json();
        document.getElementById('gh-loading')?.classList.add('hidden');
        if (result.success) {
            document.getElementById('gh-success')?.classList.remove('hidden');
            if (result.repo_url)  document.getElementById('gh-repo-link').href  = result.repo_url;
            if (result.pages_url) document.getElementById('gh-pages-link').href = result.pages_url;
            else document.getElementById('gh-pages-link')?.classList.add('hidden');
        } else { throw new Error(result.error || 'Failed'); }
    } catch(error) {
        document.getElementById('gh-loading')?.classList.add('hidden');
        document.getElementById('gh-deploy-form')?.classList.remove('hidden');
        alert('Error: ' + error.message);
    }
}

//  [11] UNIFIED HISTORY MODAL (V1 Classic + V2 Agent)
// ════════════════════════════════════════════════════════════════════════
(function() {
    let _currentHistoryTab = (window.HUB_MODE === 'agent') ? 'v2' : 'v1';

    window.openHubHistory = function() {
        const modal = document.getElementById('hub-history-modal');
        const panel = document.getElementById('hub-history-panel');
        if (!modal) return;
        modal.classList.remove('hidden');
        setTimeout(() => { if (panel) panel.style.transform = 'translateX(0)'; }, 10);
        _initHistoryUI();
        _loadHistoryTab(_currentHistoryTab);
    };

    window.closeHubHistory = function() {
        const modal = document.getElementById('hub-history-modal');
        const panel = document.getElementById('hub-history-panel');
        if (panel) panel.style.transform = 'translateX(100%)';
        setTimeout(() => { modal?.classList.add('hidden'); }, 260);
    };

    // Aliases for backward compat with agent_v2_scripts
    window.openAgentSessions  = function() { _currentHistoryTab = 'v2'; window.openHubHistory(); };
    window.closeAgentSessions = window.closeHubHistory;

    function _initHistoryUI() {
        const lang = localStorage.getItem('lang') || 'ar';
        const t = getTrans();
        const e = id => document.getElementById(id);
        if (e('hh-title'))      e('hh-title').textContent      = t.history_title;
        if (e('hh-new-label'))  e('hh-new-label').textContent  = t.history_new;
        if (e('hh-loading'))    e('hh-loading').textContent    = t.history_loading;
        if (e('hh-tab-v1-lbl')) e('hh-tab-v1-lbl').textContent = t.history_tab_classic;
        if (e('hh-tab-v2-lbl')) e('hh-tab-v2-lbl').textContent = t.history_tab_agent;
    }

    window.switchHistoryTab = function(tab) {
        _currentHistoryTab = tab;
        const t1 = document.getElementById('hh-tab-v1');
        const t2 = document.getElementById('hh-tab-v2');
        if (t1) { t1.style.background = tab==='v1' ? 'rgba(255,255,255,.08)' : 'transparent'; t1.style.color = tab==='v1' ? '#e2e8f0' : '#475569'; }
        if (t2) { t2.style.background = tab==='v2' ? 'rgba(255,255,255,.08)' : 'transparent'; t2.style.color = tab==='v2' ? '#e2e8f0' : '#475569'; }
        _loadHistoryTab(tab);
    };

    async function _loadHistoryTab(tab) {
        const list = document.getElementById('hub-history-list');
        const t = getTrans();
        if (!list) return;
        list.innerHTML = `<div style="text-align:center;padding:40px;color:#334155;font-size:12px;"><i class="fa-solid fa-spinner fa-spin" style="font-size:18px;display:block;margin-bottom:8px;"></i>${t.history_loading}</div>`;
        try {
            const url  = tab === 'v2' ? '/api/agent/v2/sessions' : '/api/hub/chats';
            const res  = await fetch(url);
            const data = await res.json();
            const items = tab === 'v2' ? (data.sessions || []) : (data.chats || []);

            if (!items.length) {
                list.innerHTML = `<div style="text-align:center;padding:40px 16px;color:#334155;"><i class="fa-solid fa-${tab==='v2'?'robot':'comments'}" style="font-size:24px;display:block;margin-bottom:10px;color:#1e293b;"></i><div style="font-size:12px;font-weight:600;color:#475569;">${t.history_empty}</div></div>`;
                return;
            }

            const now = Date.now()/1000, DAY = 86400;
            const G = { today:[], yesterday:[], week:[], older:[] };
            const GL = { today: localStorage.getItem('lang')==='ar'?'اليوم':'Today', yesterday: localStorage.getItem('lang')==='ar'?'الأمس':'Yesterday', week: localStorage.getItem('lang')==='ar'?'هذا الأسبوع':'This Week', older: localStorage.getItem('lang')==='ar'?'أقدم':'Older' };
            items.forEach(s => {
                const age = now - (s.updated_at || now);
                if (age < DAY) G.today.push(s);
                else if (age < 2*DAY) G.yesterday.push(s);
                else if (age < 7*DAY) G.week.push(s);
                else G.older.push(s);
            });

            let html = '';
            ['today','yesterday','week','older'].forEach(k => {
                if (!G[k].length) return;
                html += `<div style="padding:8px 6px 3px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#1e293b;">${GL[k]}</div>`;
                G[k].forEach(s => {
                    const sid   = s.session_id;
                    const title = _esc(s.title || (localStorage.getItem('lang')==='ar'?'محادثة':'Chat'));
                    const sub   = tab === 'v2' ? (s.file_count||0)+' '+(localStorage.getItem('lang')==='ar'?'ملفات':'files') : (s.msg_count||0)+' '+(localStorage.getItem('lang')==='ar'?'رسالة':'msgs');
                    const ico   = tab === 'v2' ? 'fa-robot' : 'fa-comments';
                    const clr   = tab === 'v2' ? '#818cf8' : '#4ade80';
                    html += `<div onclick="_loadSession('${tab}','${sid}')" role="button" style="display:flex;align-items:center;gap:9px;padding:8px;border-radius:9px;cursor:pointer;transition:background .12s;margin-bottom:1px;" onmouseenter="this.style.background='rgba(255,255,255,.05)'" onmouseleave="this.style.background='transparent'">
                        <div style="width:34px;height:34px;border-radius:8px;flex-shrink:0;background:rgba(99,102,241,.1);display:flex;align-items:center;justify-content:center;">
                            <i class="fa-solid ${ico}" style="color:${clr};font-size:13px;"></i>
                        </div>
                        <div style="flex:1;min-width:0;">
                            <div style="font-size:12px;font-weight:600;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${title}</div>
                            <div style="font-size:10px;color:#334155;margin-top:1px;">${sub}</div>
                        </div>
                        <button onclick="event.stopPropagation();_deleteSession('${tab}','${sid}',this.closest('[role=button]'))" style="padding:3px 6px;border-radius:5px;border:none;background:transparent;color:#334155;font-size:10px;cursor:pointer;opacity:0;" onmouseenter="this.style.opacity='1';this.style.color='#ef4444'" onmouseleave="this.style.opacity='0'">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>`;
                });
            });
            list.innerHTML = html;
        } catch {
            list.innerHTML = `<div style="text-align:center;padding:20px;color:#ef4444;font-size:11px;"><i class="fa-solid fa-triangle-exclamation" style="display:block;margin-bottom:6px;"></i>${localStorage.getItem('lang')==='ar'?'خطأ في التحميل':'Load error'}</div>`;
        }
    }

    function _esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    window._loadSession = async function(tab, sid) {
        window.closeHubHistory();
        try {
            const url = tab === 'v2' ? '/api/agent/v2/session/' + sid : '/api/hub/chat/' + sid;
            const d = await (await fetch(url)).json();
            if (d.files)   Object.assign(currentFiles, d.files);
            if (d.history) chatHistory = d.history;
            const feed = document.getElementById('chat-container');
            if (feed && d.history && d.history.length) {
                feed.innerHTML = '';
                d.history.forEach(function(m) {
                    if (m.role === 'user') {
                        addMessageUI('user', m.content || '');
                    } else {
                        // رسالة المساعد: هل تحتوي ملفات مُنشأة؟
                        const hasFiles = typeof m.content === 'string' && m.content.includes('###');
                        // ── بناء صندوق التفكير إن كان محفوظاً ──
                        const thinkingHtml = m.thinking
                            ? '<div class="thinking-wrapper done">' +
                                  '<div class="thinking-header" onclick="toggleThinking(this)">' +
                                      '<i class="fa-solid fa-circle-check text-green-500"></i> ' + getTrans().thinking_finished +
                                  '</div>' +
                                  '<div class="thinking-body" style="white-space:pre-wrap">' +
                                      m.thinking.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') +
                                  '</div>' +
                              '</div>'
                            : '<div class="thinking-wrapper done" style="display:none"></div>';
                        if (hasFiles) {
                            // استخرج أسماء الملفات وأظهرها كأيقونات فقط (لا كود خام)
                            const fileNames = [];
                            const re = /###\s+(\S+)/g;
                            let match;
                            while ((match = re.exec(m.content)) !== null) fileNames.push(match[1]);
                            const row = document.createElement('div');
                            row.className = 'msg-row ai v1-msg-row';
                            row.innerHTML =
                                '<div class="msg-bubble msg-ai" style="width:100%">' +
                                    thinkingHtml +
                                    '<div class="file-artifacts mt-2 pl-1"></div>' +
                                '</div>';
                            feed.appendChild(row);
                            fileNames.forEach(function(fn) { renderArtifactBadge(row, fn); });
                            renderDownloadAllBtn(row);
                        } else {
                            // رسالة نصية — نعرضها مع صندوق التفكير إن وُجد
                            if (m.thinking) {
                                const row = document.createElement('div');
                                row.className = 'msg-row ai';
                                row.innerHTML =
                                    '<div class="msg-bubble msg-ai" style="width:100%">' +
                                        thinkingHtml +
                                        '<div class="chat-response-bubble" style="display:block;">' +
                                            chatMarkdown(m.content || '') +
                                        '</div>' +
                                    '</div>';
                                feed.appendChild(row);
                                feed.scrollTop = feed.scrollHeight;
                            } else {
                                // رسالة نصية عادية بدون تفكير
                                addMessageUI('ai', chatMarkdown(m.content || ''));
                            }
                        }
                    }
                });
            }
            if (d.files && Object.keys(d.files).some(f => f.endsWith('.html'))) {
                renderPreview('index.html');
                switchView('preview');
            }
        } catch {
            addMessageUI('ai', `<span style="color:#f87171">⚠️ ${localStorage.getItem('lang')==='ar'?'تعذّر التحميل':'Failed to load'}</span>`);
        }
    };

    window._deleteSession = async function(tab, sid, rowEl) {
        const url = tab === 'v2' ? '/api/agent/v2/session/' + sid : '/api/hub/chat/' + sid;
        try {
            await fetch(url, { method: 'DELETE' });
            if (rowEl) { rowEl.style.opacity = '0'; setTimeout(() => rowEl.parentNode?.removeChild(rowEl), 200); }
        } catch {}
    };

    window.newHubChat = function() {
        window.closeHubHistory();
        chatHistory = []; currentFiles = {};
        const feed = document.getElementById('chat-container');
        if (feed) {
            feed.innerHTML = '<div id="welcome-message-container" class="msg-row ai"></div>';
            if (currentVersion === 'v2') _applyVersionUI('v2');
            else applyIdeTranslations();
        }
        const frame = document.getElementById('preview-frame');
        if (frame) frame.srcdoc = '';
        const empty = document.getElementById('preview-empty');
        if (empty) empty.style.display = '';
    };

    // Auto-save V1 chat history
    let _v1SaveTimer = null;
    window._scheduleV1Save = function() {
        if (window.HUB_MODE === 'agent') return;
        clearTimeout(_v1SaveTimer);
        _v1SaveTimer = setTimeout(function() {
            if (!chatHistory.length) return;
            const sid = window._v1SessionId = window._v1SessionId || ('v1_' + Date.now());
            let firstUser = '';
            for (let i = 0; i < chatHistory.length; i++) { if (chatHistory[i].role==='user') { firstUser=chatHistory[i].content||''; break; } }
            fetch('/api/hub/save-chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ session_id:sid, title:firstUser.slice(0,60)||'محادثة', history:chatHistory, files:currentFiles }) }).catch(() => {});
        }, 3000);
    };

    // Resume V2 session (called from history list)
    window.resumeAgentSession = async function(sessionId) {
        window.closeHubHistory();
        try {
            const data = await (await fetch('/api/agent/v2/session/' + sessionId)).json();
            if (data.files)   Object.assign(currentFiles, data.files);
            if (data.history) chatHistory = data.history;
            const lang = localStorage.getItem('lang') || 'ar';
            addMessageUI('ai', `<div class="agent-header-card"><div style="font-weight:700;color:#38bdf8;margin-bottom:4px;"><i class="fa-solid fa-robot mr-2"></i>${lang==='ar'?'استئناف جلسة الوكيل':'Resuming Agent Session'}</div><div style="font-size:12px;color:#64748b;">${data.title||'Session'} — ${Object.keys(data.files||{}).length} ${lang==='ar'?'ملف':'files'}</div></div>`);
            if (data.files && Object.keys(data.files).some(f => f.endsWith('.html'))) renderPreview('index.html');
        } catch {
            addMessageUI('ai', `<div style="color:#f87171">⚠️ ${localStorage.getItem('lang')==='ar'?'تعذّر استئناف الجلسة':'Failed to resume session'}</div>`);
        }
    };
})();

//  [12] BROWSER RUNTIME (Python/SQL/JS/HTML in browser)
// ════════════════════════════════════════════════════════════════════════
window.BrowserRuntime = (function() {
    const CDN = {
        pyodide: 'https://cdn.jsdelivr.net/pyodide/v0.27.5/full/pyodide.js',
        sqljs:   'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.12.0/sql-wasm.js',
    };
    const state = { pyodide: null, sqlReady: false, loading: {} };

    function loadScript(url) {
        if (state.loading[url]) return state.loading[url];
        state.loading[url] = new Promise((res, rej) => {
            const s = document.createElement('script');
            s.src = url; s.async = true;
            s.onload = res; s.onerror = () => rej(new Error('Failed to load: ' + url));
            document.head.appendChild(s);
        });
        return state.loading[url];
    }

    async function ensurePyodide(onOutput) {
        if (state.pyodide) return state.pyodide;
        onOutput?.({ type: 'system', text: '⏳ Loading Python runtime (Pyodide)…' });
        await loadScript(CDN.pyodide);
        state.pyodide = await loadPyodide({
            indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.27.5/full/',
            stdout: t => onOutput?.({ type: 'stdout', text: t }),
            stderr: t => onOutput?.({ type: 'stderr', text: t }),
        });
        onOutput?.({ type: 'system', text: '✅ Python ready' });
        return state.pyodide;
    }

    async function runPython(code, onOutput) {
        const py = await ensurePyodide(onOutput);
        py.setStdout({ batched: t => onOutput?.({ type: 'stdout', text: t }) });
        py.setStderr({ batched: t => onOutput?.({ type: 'stderr', text: t }) });
        try {
            const result = await py.runPythonAsync(code);
            if (result !== undefined && result !== null) onOutput?.({ type: 'result', text: String(result) });
            return { ok: true };
        } catch(err) {
            const clean = (err.message||String(err)).split('\n').filter(l => !l.includes('pyodide')).join('\n') || String(err);
            onOutput?.({ type: 'error', text: clean });
            return { ok: false, error: clean };
        }
    }

    async function runSQL(code, onOutput) {
        if (!state.sqlReady) { onOutput?.({ type: 'system', text: '⏳ Loading SQL engine…' }); await loadScript(CDN.sqljs); state.sqlReady = true; }
        try {
            const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.12.0/${f}` });
            const db = new SQL.Database();
            code.split(';').map(s => s.trim()).filter(Boolean).forEach(stmt => {
                const res = db.exec(stmt);
                if (res.length > 0) {
                    const { columns, values } = res[0];
                    const header = columns.join(' | ');
                    onOutput?.({ type: 'stdout', text: header + '\n' + '-'.repeat(header.length) });
                    values.forEach(row => onOutput?.({ type: 'stdout', text: row.join(' | ') }));
                }
            });
            db.close();
            return { ok: true };
        } catch(err) { onOutput?.({ type: 'error', text: err.message }); return { ok: false, error: err.message }; }
    }

    function runHTML(files, onOutput) {
        const htmlFile = Object.keys(files).find(f => f.match(/\.html?$/i)) || 'index.html';
        let html = files[htmlFile] || '';
        const cssFile = Object.keys(files).find(f => f.endsWith('.css'));
        const jsFile  = Object.keys(files).find(f => f.endsWith('.js') && !f.includes('node_modules'));
        if (cssFile && files[cssFile] && !html.includes(cssFile)) html = html.replace('</head>', `<style>${files[cssFile]}</style></head>`);
        if (jsFile  && files[jsFile]  && !html.includes(jsFile))  html = html.replace('</body>', `<script>${files[jsFile]}<\/script></body>`);
        const interceptor = `<script>window.onerror=function(m,s,l){parent.postMessage({type:'runtime_error',message:m+' (line '+l+')'},'*');};const _l=console.log.bind(console);console.log=function(){const a=Array.from(arguments).map(String).join(' ');parent.postMessage({type:'console_log',message:a},'*');_l.apply(console,arguments);};<\/script>`;
        html = html.replace('<head>', '<head>' + interceptor);
        const handler = e => {
            if (e.data?.type === 'runtime_error') onOutput?.({ type: 'error', text: e.data.message });
            else if (e.data?.type === 'console_log') onOutput?.({ type: 'stdout', text: e.data.message });
        };
        window.addEventListener('message', handler);
        setTimeout(() => window.removeEventListener('message', handler), 10000);
        return { ok: true, html, type: 'preview' };
    }

    function runJS(code, onOutput) {
        const fc = { log:(...a)=>{const t=a.map(String).join(' ');onOutput?.({type:'stdout',text:t});}, error:(...a)=>{onOutput?.({type:'error',text:a.map(String).join(' ')});}, warn:(...a)=>{onOutput?.({type:'warn',text:a.map(String).join(' ')});} };
        try { new Function('console', code)(fc); return { ok: true }; }
        catch(err) { onOutput?.({ type: 'error', text: err.message }); return { ok: false, error: err.message }; }
    }

    function detect(files) {
        const names = Object.keys(files || {}).map(f => f.toLowerCase());
        if (names.some(f => f.endsWith('.py')))   return 'python';
        if (names.some(f => f.endsWith('.sql')))  return 'sql';
        if (names.some(f => f.endsWith('.html') || f.endsWith('.htm'))) return 'html';
        if (names.some(f => f.endsWith('.js') || f.endsWith('.ts')))    return 'javascript';
        return null;
    }

    async function run(codeOrFiles, language, onOutput) {
        const lang = (language || '').toLowerCase();
        if (lang === 'python' || lang === 'py') return runPython(typeof codeOrFiles==='string'?codeOrFiles:Object.values(codeOrFiles).join('\n'), onOutput);
        if (lang === 'sql') return runSQL(typeof codeOrFiles==='string'?codeOrFiles:Object.values(codeOrFiles).join('\n'), onOutput);
        if (lang === 'html' || lang === 'web') return runHTML(typeof codeOrFiles==='string'?{'index.html':codeOrFiles}:codeOrFiles, onOutput);
        if (lang === 'javascript' || lang === 'js') return runJS(typeof codeOrFiles==='string'?codeOrFiles:Object.values(codeOrFiles).join('\n'), onOutput);
        onOutput?.({ type: 'system', text: `⚠️ Language '${lang}' runs natively in preview.` });
        return { ok: true, note: 'preview_only' };
    }

    return { run, detect, ensurePyodide, runPython, runSQL, runHTML, runJS, isReady: lang => lang==='python'?!!state.pyodide:lang==='sql'?state.sqlReady:true };
})();

//  [13] AGENT V2 — CLASS & ENGINE
// ════════════════════════════════════════════════════════════════════════
class AgentV2 {
    constructor(uiContainer, opts = {}) {
        this.container  = uiContainer;
        this.sessionId  = 'ag_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        this.model      = opts.model || 'deepseek-ai/deepseek-v3.2';
        this.lang       = localStorage.getItem('lang') || 'ar';
        this.plan       = null; this.files = {}; this.history = [];
        this.phase      = 'idle'; this.aborted = false; this.taskIndex = 0;
        this.logEl      = null; this.progressEl = null; this.taskListEl = null;
        this.phaseBadge = document.getElementById('agent-phase-badge');
        this.titleBar   = document.getElementById('agent-session-title');
    }

    abort() { this.aborted = true; }

    setPhase(phase) {
        this.phase = phase;
        const map = {
            planning:  { cls:'phase-planning',  icon:'🧠', ar:'التخطيط', en:'Planning' },
            executing: { cls:'phase-executing', icon:'⚙️', ar:'التنفيذ', en:'Executing' },
            testing:   { cls:'phase-testing',   icon:'🧪', ar:'الاختبار', en:'Testing' },
            fixing:    { cls:'phase-fixing',    icon:'🔧', ar:'الإصلاح', en:'Fixing' },
            complete:  { cls:'phase-complete',  icon:'✅', ar:'مكتمل', en:'Complete' },
            error:     { cls:'phase-error',     icon:'❌', ar:'خطأ', en:'Error' },
        };
        const p = map[phase] || map.executing;
        if (this.phaseBadge) {
            this.phaseBadge.className = 'agent-phase-badge ' + p.cls;
            this.phaseBadge.textContent = p.icon + ' ' + (this.lang === 'ar' ? p.ar : p.en);
        }
    }

    log(type, message) {
        if (!this.logEl) return;
        const time  = new Date().toLocaleTimeString('en', { hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
        const entry = document.createElement('div');
        entry.className = 'agent-log-entry';
        entry.innerHTML = `<span class="agent-log-time">${time}</span><span class="agent-log-text log-${type}">${message}</span>`;
        this.logEl.appendChild(entry);
        this.logEl.scrollTop = this.logEl.scrollHeight;
    }

    setProgress(pct) { if (this.progressEl) this.progressEl.style.width = Math.min(100, pct) + '%'; }

    setTaskStatus(taskId, status) {
        const card = document.getElementById('tc-' + taskId);
        if (!card) return;
        card.className = 'task-card ' + status;
        const icon = card.querySelector('.task-icon');
        if (icon) {
            icon.className = 'task-icon ' + status;
            const icons = { pending:'fa-clock', active:'fa-circle-notch fa-spin', completed:'fa-check', failed:'fa-times', fixing:'fa-wrench fa-spin' };
            icon.innerHTML = `<i class="fa-solid ${icons[status]||'fa-clock'}"></i>`;
        }
        const shine = card.querySelector('.task-card-shine');
        if (shine && status !== 'active') shine.style.display = 'none';
    }

    async gather_requirements(userRequest) {
        // ── [A] كشف إذا كان المستخدم يعمل على مشروع موجود (import/upload) ──
        const existingFiles = Object.keys(currentFiles);
        const hasExistingProject = existingFiles.length > 0;

        // ── [B] كشف إذا كان الطلب تفصيلياً وواضحاً بلا لبس ─────────────────
        const wordCount = userRequest.trim().split(/\s+/).length;
        const hasDetailedPoints = /\d+[\.\-\)]\s|•|\n[-*]|يجب|يجب أن|need|must|should|require|with:?|including|يحتوي|يتضمن/.test(userRequest);
        const isVeryDetailed = wordCount > 40 || (wordCount > 20 && hasDetailedPoints);

        const arabicPattern = /[\u0600-\u06FF]/;
        const lang = arabicPattern.test(userRequest) ? 'ar' : (this.lang || 'en');
        const ar = lang === 'ar';

        // ── [C] مشروع موجود من import/upload → أسئلة تعديل ذكية ────────────
        if (hasExistingProject) {
            const fileTypes  = [...new Set(existingFiles.map(f => f.split('.').pop().toLowerCase()))];
            const hasHTML    = fileTypes.includes('html') || fileTypes.includes('htm');
            const hasPython  = fileTypes.includes('py');
            const hasJS      = fileTypes.includes('js') || fileTypes.includes('ts');
            const hasBackend = hasPython || existingFiles.some(f => ['server.py','app.py','main.py','index.js','server.js','app.js'].includes(f));

            // اكتشاف لغة المشروع تلقائياً
            const detectedStack = hasPython ? 'Python' : (hasHTML ? 'HTML/CSS/JS' : (hasJS ? 'JavaScript' : 'Web'));
            const fileCount = existingFiles.length;

            // أسئلة ذكية مخصصة للتعديل على مشروع موجود
            const modifyQuestions = {
                questions: [
                    {
                        id: 'modify_scope',
                        text_ar: `لديك ${fileCount} ملف (${detectedStack}) — ماذا تريد؟`,
                        text_en: `You have ${fileCount} existing files (${detectedStack}) — what do you want?`,
                        options: [
                            { value: 'add_feature',   icon: '✨', ar: 'إضافة ميزة جديدة',          en: 'Add a new feature' },
                            { value: 'fix_bug',       icon: '🔧', ar: 'إصلاح مشكلة أو خطأ',       en: 'Fix a bug/issue' },
                            { value: 'redesign',      icon: '🎨', ar: 'إعادة تصميم الواجهة',       en: 'Redesign the UI' },
                            { value: 'full_rewrite',  icon: '🔄', ar: 'إعادة كتابة بالكامل',       en: 'Full rewrite' },
                        ]
                    },
                    {
                        id: 'preserve',
                        text_ar: 'ماذا تريد الحفاظ عليه من المشروع الحالي؟',
                        text_en: 'What should be preserved from the current project?',
                        options: [
                            { value: 'data',      icon: '💾', ar: 'البيانات والمنطق',       en: 'Data & logic' },
                            { value: 'design',    icon: '🎨', ar: 'الألوان والتصميم',       en: 'Colors & design' },
                            { value: 'structure', icon: '📁', ar: 'هيكل الملفات',           en: 'File structure' },
                            { value: 'nothing',   icon: '🆕', ar: 'لا شيء — ابدأ من صفر',  en: 'Nothing — start fresh' },
                        ]
                    }
                ]
            };
            return this._runWizard(modifyQuestions, ar);
        }

        // ── [D] طلب تفصيلي جداً وواضح → تخطي الـ wizard ────────────────────
        if (isVeryDetailed) {
            this.log('info', ar ? '📋 الطلب واضح ومفصّل — بدء التنفيذ مباشرة...' : '📋 Detailed request detected — skipping questions...');
            // استخراج اللغة تلقائياً من الطلب
            const langHints = {
                python:     /python|بايثون|بيثون/i,
                javascript: /javascript|nodejs|node\.js|جافاسكريبت/i,
                java:       /\bjava\b|جافا/i,
                cpp:        /c\+\+|cpp/i,
                go:         /\bgolang\b|\bgo\b/i,
                rust:       /\brust\b/i,
                sql:        /\bsql\b|قاعدة بيانات/i,
            };
            let detectedLang = 'web';
            for (const [l, rx] of Object.entries(langHints)) {
                if (rx.test(userRequest)) { detectedLang = l; break; }
            }
            return { stack: detectedLang, data: 'auto', ui_language: ar ? 'Arabic' : 'English', auto_detected: true };
        }

        // ── [E] الحالة العادية → AI wizard (السلوك الأصلي) ─────────────────
        let aiQuestions = null;
        try {
            const sysPrompt = `You are a technical project assistant. Generate exactly 2 smart clarifying questions for the user's project request.

IMPORTANT — These are the ONLY languages this system can actually execute and test (all run in the USER'S BROWSER, zero load on our server):

┌─ NATIVE / WASM (instant, no network) ──────────────────────────────┐
│  HTML + CSS + JavaScript   → full web apps, visual browser preview  │
│  JavaScript (standalone)   → sandboxed Function execution           │
│  TypeScript                → compiled by TypeScript CDN → JS        │
│  Python 3                  → Pyodide WASM (stdlib, no file I/O)     │
│  SQL / SQLite              → SQL.js WASM                            │
└────────────────────────────────────────────────────────────────────┘
┌─ PISTON API (called from browser, zero load on our server) ─────────┐
│  Java · C · C++ · C# · Go · Rust · Swift · Kotlin · PHP · Ruby      │

    _cleanCode(content, language) {
        if (content == null) return '';
        let c = String(content).trim();

        // ── حذف code fences ──────────────────────────────────────────────
        const fenceMatch = c.match(/^```[a-zA-Z]*\n?/);
        if (fenceMatch) c = c.slice(fenceMatch[0].length).trim();
        if (c.endsWith('```')) c = c.slice(0, -3).trim();

        // ── حذف أي نص توضيحي قبل بداية الملف الفعلية ────────────────────
        // HTML: ابحث عن أول <!DOCTYPE أو <html أو <
        if (language === 'html') {
            const doctype = c.search(/<!DOCTYPE\s+html/i);
            const htmlTag = c.search(/<html[\s>]/i);
            const firstTag = c.indexOf('<');
            const start = doctype !== -1 ? doctype : (htmlTag !== -1 ? htmlTag : firstTag);
            if (start > 0 && start < 300) c = c.slice(start).trim(); // فقط إذا كان النص قصيراً (< 300 حرف)
        }

        // CSS: ابحث عن أول { أو selector
        if (language === 'css') {
            const firstBrace = c.indexOf('{');
            const firstSelector = c.search(/^[a-zA-Z.*#:@\[]/m);
            if (firstBrace > 0 && firstBrace < 200) {
                const start = firstSelector !== -1 && firstSelector < firstBrace ? firstSelector : 0;
                if (start > 0 && start < 200) c = c.slice(start).trim();
            }
        }

        // JS/TS: ابحث عن أول سطر كود حقيقي (ليس نثراً إنجليزياً)
        if (language === 'javascript' || language === 'js' || language === 'typescript') {
            const lines = c.split('\n');
            const codeStart = lines.findIndex(l => {
                const t = l.trim();
                return t.startsWith('//') || t.startsWith('/*') || t.startsWith('const ') ||
                       t.startsWith('let ') || t.startsWith('var ') || t.startsWith('function ') ||
                       t.startsWith('class ') || t.startsWith('import ') || t.startsWith('export ') ||
                       t.startsWith('(') || t.startsWith("'use strict'") || t.startsWith('"use strict"') ||
                       /^[a-zA-Z_$][\w$]*\s*[=({]/.test(t) || t.startsWith('window.') || t.startsWith('document.');
            });
            if (codeStart > 0 && codeStart < 5) c = lines.slice(codeStart).join('\n').trim();
        }

        return c;
    }

    async test_file(task, content) {
        this.setPhase('testing');
        this.log('testing', `🧪 ${this.lang==='ar'?'اختبار':'Testing'}: ${task.filename}`);
        if (!task.testable || task.test_type === 'none') return { passed:true, errors:[], type:'skipped' };

        // ── HTML → فحص بنيوي في المتصفح ────────────────────────────────
        if (task.test_type === 'visual' && task.language === 'html') return this._testHTML(content);

        // ── syntax check → BrowserExecutor (متصفح فقط، لا سيرفر) ────────
        if (task.test_type === 'syntax') {
            const result = window.BrowserExecutor
                ? window.BrowserExecutor.checkSyntax(content, task.language)
                : { valid: true, errors: [], note: 'BrowserExecutor not loaded' };
            return { passed: result.valid, errors: result.errors || [], type: 'syntax' };
        }

        // ── تشغيل فعلي → BrowserExecutor (متصفح/Piston، لا سيرفر) ──────
        if (task.test_type === 'run') {
            if (!window.BrowserExecutor) return { passed: true, errors: [], type: 'run-skip' };
            try {
                const result = await window.BrowserExecutor.execute(content, task.language, 15000);
                if (result.stdout) this.log('success', result.stdout.slice(0, 200));
                if (result.stderr) this.log('error',   result.stderr.slice(0, 200));
                return {
                    passed:    result.passed,
                    errors:    result.passed ? [] : [result.stderr || 'Execution failed'],
                    stdout:    result.stdout,
                    stderr:    result.stderr,
                    type:      'run',
                };
            } catch(e) {
                return { passed: false, errors: [e.message], type: 'run-error' };
            }
        }

        return { passed:true, errors:[], type:'unknown' };
    }

    async _testHTML(htmlContent) {
        // Structural validation — works in all environments including Replit sandbox
        try {
            const errors = [];
            const s = String(htmlContent || '');
            if (s.length < 50) { errors.push('File appears empty or too short'); }
            if (!/<html/i.test(s) && !/<body/i.test(s)) { errors.push('Missing basic HTML structure'); }
            // Check inline JS syntax
            const scripts = [...s.matchAll(/<script(?![^>]*src)[^>]*>([\s\S]*?)<\/script>/gi)].map(m => m[1]).filter(sc => sc.trim().length > 10);
            for (const sc of scripts) {
                try { new Function(sc); } catch(e) { errors.push(`JS: ${e.message.slice(0, 80)}`); break; }
            }
            return { passed: errors.length === 0, errors, type: 'structural' };
        } catch(e) {
            return { passed: true, errors: [], type: 'structural-skip' };
        }
    }

            { role:'user',   content:`File: ${task.filename}\nLanguage: ${task.language}\n\nERRORS:\n${errors.join('\n')}\n\nCURRENT CODE:\n${content}\n\nOutput the COMPLETE fixed file content:` }
        ];

        for await (const chunk of this.streamFromAPI(messages, 'fix')) {
            if (this.aborted) throw new Error('Aborted');
