    async *streamFromAPI(messages, phase = 'execute') {
        const t0 = performance.now();
        const primaryModel = 'minimaxai/minimax-m2.5';   // NVIDIA endpoint
        const fallbackModel = this.model;                  // deepseek-v3.1-terminus

        // Try primary (NVIDIA MiniMax-M2.5) first
        let useNvidia = true;
        let res;
        try {
            console.log(`[AgentV2][${phase}] → primary: ${primaryModel} | msgs: ${messages.length}`);
            res = await fetch('/api/agent/v2/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages, model: primaryModel, phase, session_id: this.sessionId, provider: 'nvidia' })
            });
            if (!res.ok) {
                const errTxt = await res.text();
                console.warn(`[AgentV2][${phase}] primary failed ${res.status}: ${errTxt.slice(0,120)} → falling back`);
                useNvidia = false;
            }
        } catch(e) {
            console.warn(`[AgentV2][${phase}] primary error: ${e.message} → falling back`);
            useNvidia = false;
        }

        // Fallback to V1 model
        if (!useNvidia) {
            console.log(`[AgentV2][${phase}] → fallback: ${fallbackModel}`);
            res = await fetch('/api/agent/v2/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages, model: fallbackModel, phase, session_id: this.sessionId })
            });
            if (!res.ok) { const err = await res.text(); throw new Error(`API error ${res.status}: ${err.slice(0,200)}`); }
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '', totalChars = 0;
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();
            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const raw = line.slice(6);
                if (raw === '[DONE]') {
                    const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
                    console.log(`[AgentV2][${phase}] ✅ done | ${totalChars} chars | ${elapsed}s | model: ${useNvidia ? primaryModel : fallbackModel}`);
                    return;
                }
                try {
                    const parsed = JSON.parse(raw);
                    if (parsed.type === 'content') totalChars += (parsed.content || '').length;
                    yield parsed;
                } catch {}
            }
        }
        const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
        console.log(`[AgentV2][${phase}] ✅ stream end | ${totalChars} chars | ${elapsed}s`);
    }

    async saveState(status = 'running') {
        try {
            await fetch('/api/agent/v2/save-state', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id:this.sessionId, title:this.plan?.title||'Agent Session', status, plan:this.plan, files:this.files, history:chatHistory.slice(-20), current_task_index:this.taskIndex, total_tasks:this.plan?.tasks?.length||0, metadata:{ model:this.model, lang:this.lang } })
            });
        } catch {}
    }

    async run(userRequest) {
        const MAX_RETRIES = 3;
        const lang = this.lang;
        this._originalRequest = userRequest;  // store for language detection
        try {
            this._buildAgentUI();

            // Phase 0: gather requirements
            const hasExistingFiles = Object.keys(currentFiles).length > 0;
            if (!hasExistingFiles) {
                this.requirements = await this.gather_requirements(userRequest);
            } else if (hasExistingFiles && !this.requirements) {
                // مشروع موجود من import/upload — اسأل أسئلة التعديل
                this.requirements = await this.gather_requirements(userRequest);
            }

            // إذا كان الطلب واضحاً ومُكتشَف تلقائياً، لا نضيف [Requirements] ضجيجاً
            const reqSummary = this.requirements?.auto_detected
                ? ''
                : Object.entries(this.requirements || {}).map(([k,v]) => `${k}:${v}`).join(', ');
            const fullRequest = reqSummary ? userRequest + `\n[Requirements: ${reqSummary}]` : userRequest;

            const plan = await this.plan_task(fullRequest);
            this._renderPlan(plan);
            await this.saveState('running');

            for (let i = 0; i < plan.tasks.length; i++) {
                if (this.aborted) break;
                this.taskIndex = i;
                const task = plan.tasks[i];
                this.setProgress(10 + (i / plan.tasks.length) * 80);
                let content;
                try { content = await this.execute_task(task, i); }
                catch(e) { this.setTaskStatus(task.id, 'failed'); this.log('error', `❌ ${task.filename}: ${e.message}`); await this.saveState('running'); continue; }

                if (task.testable && task.test_type !== 'none') {
                    try {
                        let testResult = await this.test_file(task, content);
                        this._renderTestResult(task, testResult);
                        if (!testResult.passed && testResult.errors?.length > 0) {
                            let fixedContent = content, fixed = false;
                            for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
                                if (this.aborted) break;
                                try {
                                    fixedContent = await this.fix_errors(task, fixedContent, testResult.errors, attempt);
                                    testResult = await this.test_file(task, fixedContent);
                                    this._renderTestResult(task, testResult);
                                    if (testResult.passed) { fixed = true; break; }
                                } catch(e) { this.log('error', `Fix attempt ${attempt} failed: ${e.message}`); break; }
                            }
                            this.log(fixed ? 'success' : 'error', fixed ? `🔧 ${lang==='ar'?'تم إصلاح':'Fixed'}: ${task.filename}` : `⚠️ ${lang==='ar'?'تعذّر إصلاح':'Could not fix'}: ${task.filename}`);
                        }
                    } catch(testErr) {
                        this.log('warn', `⚠️ ${lang==='ar'?'تخطي الاختبار':'Test skipped'}: ${testErr.message?.slice(0,100)}`);
                    }
                }
                this.setTaskStatus(task.id, 'completed');
                await this.saveState('running');
            }

            if (!this.aborted) {
                this.setPhase('complete'); this.setProgress(100);
                await this.saveState('completed');
                this._renderComplete();
                this._restoreSendBtn();
                const htmlFiles = Object.keys(this.files).filter(f => f.endsWith('.html'));
                if (htmlFiles.length > 0) {
                    const main = htmlFiles.find(f => f === 'index.html') || htmlFiles[0];
                    currentPreviewFile = main;
                    renderPreview(main);
                    setTimeout(() => switchView('preview'), 800);
                }
            } else {
                this._restoreSendBtn();
            }
        } catch(e) {
            this.setPhase('error');
            this.log('error', `❌ ${lang==='ar'?'خطأ فادح':'Fatal error'}: ${e.message}`);
            await this.saveState('failed');
            this._renderError(e.message);
            this._restoreSendBtn();
        }
    }

    _buildAgentUI() {
        const lang = this.lang;
        // Convert send button → stop button
        const sendBtn = document.getElementById('send-btn') || document.querySelector('.send-btn');
        if (sendBtn) {
            sendBtn.dataset.origHtml = sendBtn.innerHTML;
            sendBtn.innerHTML = '<i class="fa-solid fa-stop" style="font-size:14px;"></i>';
            sendBtn.style.background = 'rgba(239,68,68,0.15)';
            sendBtn.style.borderColor = 'rgba(239,68,68,0.4)';
            sendBtn.onclick = () => { this.abort(); this._restoreSendBtn(); };
            this._sendBtnRef = sendBtn;
        }

        this.container.innerHTML = `
        <div class="msg-row ai agent-session-wrapper">
        <div class="msg-bubble msg-ai" style="width:100%;padding:14px 16px;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                <div class="agent-progress-bar" style="flex:1;margin:0;">
                    <div class="agent-progress-fill" id="agent-progress-fill" style="width:3%;"></div>
                </div>
                <span style="font-size:10px;color:#64748b;flex-shrink:0;" id="agent-status-text">${lang==='ar'?'يبدأ...':'Starting...'}</span>
            </div>
            <div id="agent-task-list" class="task-plan-container"></div>
            <div class="agent-log" id="agent-log-${this.sessionId}"></div>
            <div class="agent-file-tree" id="agent-file-tree" style="display:none;">
                <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;">
                    <i class="fa-solid fa-folder-open" style="margin-inline-end:4px;"></i>${lang==='ar'?'الملفات المنشأة':'Created Files'}
                </div>
            </div>
            <div id="agent-test-results"></div>
            <div id="agent-complete-area"></div>
        </div>
        </div>`;

        this.logEl      = this.container.querySelector(`#agent-log-${this.sessionId}`);
        this.progressEl = this.container.querySelector('#agent-progress-fill');
        this.taskListEl = this.container.querySelector('#agent-task-list');
        this.statusEl   = this.container.querySelector('#agent-status-text');
        const chat = document.getElementById('chat-container');
        if (chat) chat.scrollTop = chat.scrollHeight;
    }

    _restoreSendBtn() {
        const btn = this._sendBtnRef;
        if (!btn) return;
        btn.innerHTML = btn.dataset.origHtml || '<i class="fa-solid fa-arrow-up"></i>';
        btn.style.background = '';
        btn.style.borderColor = '';
        btn.onclick = () => sendMessage();
        this._sendBtnRef = null;
    }

    _renderPlan(plan) {
        if (!this.taskListEl) return;
        const lang = this.lang;
        if (this.titleBar) this.titleBar.textContent = plan.title || (lang==='ar'?'جلسة الوكيل':'Agent Session');
        const stackBadges = (plan.tech_stack||[]).map(t => `<span style="padding:2px 8px;border-radius:999px;font-size:9.5px;font-weight:700;background:rgba(139,92,246,0.15);color:#a78bfa;border:1px solid rgba(139,92,246,0.2);">${t}</span>`).join('');
        this.taskListEl.innerHTML = `
            <div style="margin-bottom:8px;">
                <div style="font-weight:700;font-size:13px;margin-bottom:4px;">${plan.title}</div>
                <div style="font-size:11px;color:#64748b;margin-bottom:6px;">${plan.description||''}</div>
                <div style="display:flex;flex-wrap:wrap;gap:4px;">${stackBadges}</div>
            </div>
            <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;">
                ${lang==='ar'?'خطة التنفيذ':'EXECUTION PLAN'} — ${plan.tasks?.length||0} ${lang==='ar'?'مهمة':'tasks'}
            </div>`;
        const langIcons = { html:'fa-html5', css:'fa-css3-alt', js:'fa-js', javascript:'fa-js', py:'fa-python', python:'fa-python', ts:'fa-code', json:'fa-brackets-curly', md:'fa-file-alt' };
        (plan.tasks||[]).forEach(task => {
            const ext  = (task.filename||'').split('.').pop().toLowerCase();
            const icon = langIcons[task.language] || langIcons[ext] || 'fa-file';
            const card = document.createElement('div');
            card.className = 'task-card pending'; card.id = 'tc-' + task.id;
            card.innerHTML = `<div class="task-card-shine"></div><div class="task-icon pending"><i class="fa-solid fa-clock"></i></div><div class="task-info"><div class="task-title">${task.title}</div><div class="task-desc">${task.filename} — ${(task.description||'').slice(0,50)}</div></div><span class="task-lang-badge">${task.language||ext}</span>`;
            this.taskListEl.appendChild(card);
        });
        const ftree = this.container?.querySelector('#agent-file-tree');
        if (ftree) ftree.style.display = 'block';
    }

    _renderTestResult(task, result) {
        const area = this.container?.querySelector('#agent-test-results');
        if (!area) return;
        const passed = result.passed || result.valid;
        const icon   = passed ? '✅' : '⚠️';
        const cls    = passed ? 'passed' : 'failed';
        const errHtml = (!passed && result.errors?.length) ? `<div class="test-output">${result.errors.slice(0,3).join('\n')}</div>` : '';
        const stdoutHtml = result.stdout?.trim() ? `<div class="test-output" style="color:#4ade80;">${result.stdout.slice(0,300)}</div>` : '';
        area.innerHTML = `<div class="test-result-card ${cls}"><div style="font-weight:600;font-size:12px;">${icon} ${task.filename} — ${passed?(this.lang==='ar'?'اجتاز الاختبار':'Test Passed'):(this.lang==='ar'?'أخطاء موجودة':'Errors Found')}</div>${errHtml}${stdoutHtml}</div>`;
    }

    _renderComplete() {
        const area = this.container?.querySelector('#agent-complete-area');
        if (!area) return;
        const lang = this.lang;

        // Hide the plan task list — no longer needed after completion
        if (this.taskListEl) this.taskListEl.style.display = 'none';
        const count = Object.keys(this.files).length;
        const fileList = Object.keys(this.files).map(f => {
            const sf = f.replace(/'/g,"\\'");
            return `<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 6px 2px 8px;border-radius:6px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);">
                <span onclick="renderPreview('${sf}');switchView('preview')" style="cursor:pointer;color:#4ade80;font-size:11px;">${f}</span>
                <button onclick="openFileEditor('${sf}')" style="padding:1px 6px;border-radius:4px;border:1px solid rgba(99,102,241,.3);background:rgba(99,102,241,.1);color:#818cf8;font-size:9px;cursor:pointer;" title="${lang==='ar'?'تعديل':'Edit'}"><i class="fa-solid fa-pen-to-square"></i></button>
            </span>`;
        }).join('');
        area.innerHTML = `
            <div class="agent-complete-banner">
                <div style="font-size:28px;margin-bottom:6px;">🎉</div>
                <div style="font-weight:700;font-size:15px;color:#4ade80;margin-bottom:4px;">${lang==='ar'?'اكتمل المشروع!':'Project Complete!'}</div>
                <div style="font-size:12px;color:#64748b;margin-bottom:10px;">${count} ${lang==='ar'?'ملفات تم إنشاؤها بنجاح':'files created successfully'}</div>
                <div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:12px;">${fileList}</div>
                <button onclick="downloadAll()" style="padding:6px 18px;border-radius:20px;background:linear-gradient(135deg,#0ea5e9,#8b5cf6);color:white;font-size:12px;font-weight:600;cursor:pointer;border:none;">
                    <i class="fa-solid fa-download mr-1"></i>${lang==='ar'?'تحميل المشروع':'Download Project'}
                </button>
            </div>`;
        if (this.statusEl) this.statusEl.textContent = lang==='ar' ? 'اكتمل ✅' : 'Complete ✅';
    }

    _renderError(message) {
        const area = this.container?.querySelector('#agent-complete-area');
        if (!area) return;
        const lang = this.lang;
        area.innerHTML = `<div class="test-result-card failed" style="text-align:center;padding:16px;"><div style="font-size:24px;margin-bottom:6px;">⚠️</div><div style="font-weight:600;margin-bottom:4px;">${lang==='ar'?'حدث خطأ':'An error occurred'}</div><div class="test-output" style="text-align:left;">${message}</div><button onclick="this.closest('.msg-bubble').remove()" style="margin-top:10px;padding:4px 14px;border-radius:20px;border:1px solid rgba(239,68,68,0.3);background:transparent;color:#f87171;font-size:11px;cursor:pointer;">${lang==='ar'?'إغلاق':'Close'}</button></div>`;
    }
}

//  [14] V2 SEND MESSAGE HANDLER
// ════════════════════════════════════════════════════════════════════════

function _v2IsChat(text, mode) {
    if (mode === 'chat') return true;
    if (mode === 'build') return false;
    const t = text.trim().toLowerCase();
    const words = t.split(/\s+/).filter(Boolean);
    const hasFiles = Object.keys(currentFiles).length > 0;

    // ── عندما يوجد مشروع مبني: أي سؤال/استفسار → chat بالسياق ──
    if (hasFiles) {
        // طلبات بناء/تعديل صريحة → agent
        const modifyKW = ['أضف','اضف','أضيف','عدّل','عدل','غيّر','غير','احذف','ابنِ من جديد','أعد بناء','rebuild','rewrite','refactor','add feature','add a','modify','delete','remove feature','update the'];
        if (modifyKW.some(k => t.includes(k))) return false;
        // شكاوى من أخطاء → agent (يحاول إصلاحها)
        const fixKW = ['لا تعمل','لا يعمل','مشكلة','خطأ','broken','not work','bug','issue','error','خلل','مش شغال','crashes','يتعطل','doesn\'t work'];
        if (fixKW.some(k => t.includes(k))) return false;
        // أي سؤال عن المشروع القائم → chat
        return true;
    }

    // ── لا يوجد مشروع: كلمة ≤3 بدون build keyword → chat ──
    if (words.length <= 3) {
        const buildKWShort = ['build','create','make','generate','ابنِ','أنشئ','اصنع','بناء','اكتب','طور','صمم'];
        if (!buildKWShort.some(k => t.includes(k))) return true;
    }
    const buildKW = ['build','create','make','generate','develop','code','write','implement','design','app','website','page','tool','script','program','project','ابنِ','أنشئ','اصنع','بناء','اكتب','طور','صمم','تطبيق','موقع','صفحة','برنامج','مشروع','كود','سكريبت','أداة','نظام','انشاء','انشئ'];
    if (buildKW.some(k => t.includes(k))) return false;
    const chatKW = ['what','how','why','explain','tell','describe','difference','compare','ما','كيف','لماذا','اشرح','اخبرني','ما هو','ما هي','من','متى','أين','هل','فرق','مقارنة','وضح','مميزات','مزايا','خصائص','مرحبا','مرحباً','أهلا','hello','hi','hey','شكراً','شكرا','thanks','good','صباح','مساء','سؤال','features','capabilities'];
    if (chatKW.some(k => t.includes(k))) return true;
    return t.endsWith('?') || t.endsWith('؟');
}

async function _sendMessageV2() {
    const input     = document.getElementById('prompt-input');
    const fileInput = document.getElementById('file-input');
    const text      = input?.value.trim();
    if (!text && (!fileInput || fileInput.files.length === 0)) return;

    addMessageUI('user', (text || '').replace(/\n/g, '<br>'));
    chatHistory.push({ role: 'user', content: text });
    input.value = ''; if (input.style) input.style.height = 'auto';
    filesBuffer = {};
    switchView('chat');

    const feed = document.getElementById('chat-container');
    const agentContainer = document.createElement('div');
    feed.appendChild(agentContainer);

    const isChat = _v2IsChat(text, currentMode);
    if (isChat) {
        feed.removeChild(agentContainer);
        let chatText = text;
        if (Object.keys(currentFiles).length > 0) {
            const fileList = Object.keys(currentFiles).join(', ');
            const preview = Object.entries(currentFiles).slice(0, 2).map(([f, c]) => `${f}:\n${c.slice(0, 400)}`).join('\n---\n');
            // Add plan context if available (completed + pending tasks)
            let planCtx = '';
            if (activeAgentV2?.plan?.tasks) {
                const done = activeAgentV2.plan.tasks.filter(t => activeAgentV2.files[t.filename]).map(t => t.filename);
                const pending = activeAgentV2.plan.tasks.filter(t => !activeAgentV2.files[t.filename]).map(t => t.filename);
                planCtx = `\nCompleted files: ${done.join(', ') || 'none'}\nPending files: ${pending.join(', ') || 'none'}`;
            }
            chatText = `[CONTEXT: Existing project files: ${fileList}${planCtx}]\n[Preview:\n${preview}\n]\n\nUser question: ${text}`;
        }
        await handleChatStream(chatText, fileInput ? fileInput.files : [], 'auto');
        activeAgentV2 = null;
        if (fileInput) { fileInput.value = ''; updateFileBadge(); }
        return;
    }

    const agentModel = 'deepseek-ai/deepseek-v3.1-terminus';
    activeAgentV2 = new AgentV2(agentContainer, { model: agentModel });
    await activeAgentV2.run(text);
    activeAgentV2 = null;
    if (fileInput) { fileInput.value = ''; updateFileBadge(); }
}

// Keyboard shortcut for send
document.addEventListener('DOMContentLoaded', function() {
    const input = document.getElementById('prompt-input');
    if (input) {
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    }
});

// ════════════════════════════════════════════════════════════════════════
//  [15] API BRIDGE — parent handler for preview iframe fetch calls
//  Receives postMessage from srcdoc iframe, executes the real fetch
//  (same-origin, no CORS issues), returns result back to iframe.
// ════════════════════════════════════════════════════════════════════════
window.addEventListener('message', async function(ev) {
    if (!ev.data || ev.data.type !== 'api_bridge_req') return;
    var id = ev.data.id, url = ev.data.url, method = ev.data.method,
        headers = ev.data.headers || {}, body = ev.data.body || {};
    try {
        var origin = window.location.origin;
        var proxyUrl  = url.startsWith('/') ? (origin + url) : url;
        var proxyBody = Object.assign({}, body);
        var proxyHdrs = { 'Content-Type': 'application/json' };

        // If the request carries Authorization: Bearer, route through
        // /api/preview-proxy with api_key in body (avoids CORS/credentials conflict).
        var authVal = headers['Authorization'] || headers['authorization'] || '';
        if (authVal.startsWith('Bearer ')) {
            // Route through session-authenticated endpoint — avoids api_key Redis lookup issues.
            // The parent page has a valid session, so no api_key needed here.
            proxyUrl = origin + '/api/hub/ai-proxy';
            // Do NOT forward Authorization header — session cookie is used instead
        } else {
            Object.assign(proxyHdrs, headers);
        }

        var fetchOpts = { method: method || 'POST', headers: proxyHdrs };
        if ((method || 'POST') !== 'GET') fetchOpts.body = JSON.stringify(proxyBody);

        var resp = await fetch(proxyUrl, fetchOpts);
        var data;
        try { data = await resp.json(); } catch(e) { data = { error: 'Invalid JSON from server' }; }
        if (ev.source) ev.source.postMessage({ type: 'api_bridge_resp', id: id, data: data, status: resp.status }, '*');
    } catch(err) {
        if (ev.source) ev.source.postMessage({ type: 'api_bridge_resp', id: id, error: err.message }, '*');
    }
}, false);
</script>
