<!-- GitHub One-Click Deploy Component -->
<div id="githubDeployModal" class="fixed inset-0 z-[100] flex items-center justify-center opacity-0 pointer-events-none transition duration-300">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeDeployModal()"></div>

    <div class="bg-white dark:bg-cardbg p-8 rounded-2xl shadow-2xl w-full max-w-lg relative z-10 transform scale-95 transition-transform duration-300 text-right" dir="rtl">

        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gray-900 rounded-xl flex items-center justify-center">
                    <i class="fab fa-github text-2xl text-white"></i>
                </div>
                <div>
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white">نشر في GitHub</h3>
                    <p class="text-sm text-gray-500">One-Click Deploy</p>
                </div>
            </div>
            <button onclick="closeDeployModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <!-- Not Connected State -->
        <div id="githubNotConnected" class="hidden text-center py-8">
            <div class="w-20 h-20 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fab fa-github text-4xl text-gray-400"></i>
            </div>
            <h4 class="text-lg font-bold mb-2">ربط حساب GitHub</h4>
            <p class="text-gray-500 mb-6">للنشر المباشر، يجب ربط حسابك أولاً</p>
            <a href="/auth/github/login" class="inline-flex items-center gap-2 px-6 py-3 bg-gray-900 text-white rounded-xl font-bold hover:bg-gray-800 transition">
                <i class="fab fa-github"></i>
                <span>ربط بضغطة واحدة</span>
            </a>
        </div>

        <!-- Connected State -->
        <div id="githubConnected" class="space-y-4">

            <!-- Repo Name -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300">اسم المستودع</label>
                <input type="text" id="deployRepoName" 
                       class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-darkbg border border-gray-200 dark:border-gray-700 focus:border-primary outline-none dark:text-white"
                       placeholder="my-awesome-project">
            </div>

            <!-- Description -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300">الوصف</label>
                <input type="text" id="deployDescription" 
                       class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-darkbg border border-gray-200 dark:border-gray-700 focus:border-primary outline-none dark:text-white"
                       placeholder="Generated by Nexus AI Code Builder">
            </div>

            <!-- Options -->
            <div class="flex items-center justify-between py-2">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="deployPrivate" class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary" onchange="onPrivateChange()">
                    <span class="text-sm text-gray-700 dark:text-gray-300">مستودع خاص</span>
                </label>

                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="deployPages" checked class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary" onchange="onPagesChange()">
                    <span class="text-sm text-gray-700 dark:text-gray-300">تفعيل GitHub Pages</span>
                </label>
            </div>
            <p id="pagesWarning" class="hidden text-xs text-yellow-500 flex items-center gap-1"><i class="fas fa-exclamation-triangle"></i> GitHub Pages يتطلب مستودعاً عاماً — تم إلغاء تحديد "خاص" تلقائياً</p>

            <!-- Preview Files -->
            <div class="bg-gray-50 dark:bg-darkbg rounded-xl p-4 max-h-40 overflow-y-auto">
                <p class="text-xs font-semibold text-gray-500 mb-2">الملفات المراد رفعها:</p>
                <ul id="deployFilesList" class="space-y-1 text-sm text-gray-600 dark:text-gray-400">
                    <!-- سيتم ملؤها بالجافاسكربت -->
                </ul>
            </div>

            <!-- Deploy Button -->
            <button onclick="executeDeploy()" id="executeDeployBtn" 
                    class="w-full py-4 bg-gradient-to-r from-gray-900 to-gray-800 text-white rounded-xl font-bold hover:opacity-90 transition flex items-center justify-center gap-2">
                <i class="fas fa-rocket"></i>
                <span>نشر الآن</span>
            </button>
        </div>

        <!-- Loading State -->
        <div id="deployLoading" class="hidden text-center py-8">
            <div class="loading-spinner mx-auto mb-4 w-12 h-12 border-4"></div>
            <h4 class="text-lg font-bold mb-2">جاري النشر...</h4>
            <p id="deployStatus" class="text-gray-500 text-sm">إنشاء المستودع</p>
        </div>

        <!-- Success State -->
        <div id="deploySuccess" class="hidden text-center py-6">
            <div class="w-16 h-16 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check text-3xl text-green-500"></i>
            </div>
            <h4 class="text-lg font-bold mb-2 text-gray-900 dark:text-white">تم النشر بنجاح! 🎉</h4>

            <div class="space-y-3 mt-4">
                <a id="repoLink" href="#" target="_blank" 
                   class="block w-full py-3 bg-gray-100 dark:bg-gray-800 rounded-xl font-semibold hover:bg-gray-200 dark:hover:bg-gray-700 transition flex items-center justify-center gap-2">
                    <i class="fab fa-github"></i>
                    <span>فتح المستودع</span>
                </a>

                <a id="pagesLink" href="#" target="_blank" 
                   class="block w-full py-3 bg-primary text-white rounded-xl font-semibold hover:opacity-90 transition flex items-center justify-center gap-2">
                    <i class="fas fa-external-link-alt"></i>
                    <span>عرض الموقع المباشر</span>
                </a>
            </div>
        </div>
    </div>
</div>

<!-- زر النشر العائم (يظهر بعد إنشاء الكود) -->
<button onclick="openDeployModal()" id="deployFab" 
        class="fixed bottom-24 left-6 w-14 h-14 bg-gradient-to-r from-gray-900 to-gray-800 rounded-full shadow-2xl flex items-center justify-center text-white text-xl hover:scale-110 transition z-40 hidden">
    <i class="fab fa-github"></i>
</button>

<script>
let generatedFiles = []; // سيتم ملؤها من Code Hub

function openDeployModal() {
    const modal = document.getElementById('githubDeployModal');
    modal.classList.remove('opacity-0', 'pointer-events-none');

    // التحقق من حالة الاتصال
    checkGitHubStatus();
}

function closeDeployModal() {
    const modal = document.getElementById('githubDeployModal');
    modal.classList.add('opacity-0', 'pointer-events-none');
}

async function checkGitHubStatus() {
    try {
        const response = await fetch('/api/github/status');
        const data = await response.json();

        if (data.connected) {
            document.getElementById('githubNotConnected').classList.add('hidden');
            document.getElementById('githubConnected').classList.remove('hidden');
            updateFilesList();
        } else {
            document.getElementById('githubNotConnected').classList.remove('hidden');
            document.getElementById('githubConnected').classList.add('hidden');
        }
    } catch (e) {
        // افتراضياً نعرض واجهة الربط
        document.getElementById('githubNotConnected').classList.remove('hidden');
    }
}

function updateFilesList() {
    const list = document.getElementById('deployFilesList');
    list.innerHTML = generatedFiles.map(f => 
        `<li class="flex items-center gap-2"><i class="fas fa-file-code text-primary"></i> ${f.path}</li>`
    ).join('');
}

function onPagesChange() {
    const pages = document.getElementById('deployPages').checked;
    const privateBox = document.getElementById('deployPrivate');
    const warn = document.getElementById('pagesWarning');
    if (pages && privateBox.checked) {
        privateBox.checked = false;
        warn.classList.remove('hidden');
        setTimeout(() => warn.classList.add('hidden'), 4000);
    }
}

function onPrivateChange() {
    const privateBox = document.getElementById('deployPrivate').checked;
    const pagesBox = document.getElementById('deployPages');
    if (privateBox && pagesBox.checked) {
        pagesBox.checked = false;
    }
}

async function generateReadme(files, repoName, description) {
    try {
        const filesPreview = files.slice(0, 6).map(f =>
            f.path + ':
' + (f.content || '').slice(0, 300)
        ).join('
---
');

        const resp = await fetch('/api/hub/ai-proxy', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                model: 'deepseek-ai/deepseek-v3.1-terminus',
                stream: false,
                messages: [{
                    role: 'user',
                    content: 'Generate a professional README.md for this project.
Project name: ' + repoName + '
Description: ' + description + '
Files:
' + filesPreview + '

Respond ONLY with the README.md content, no explanation.'
                }]
            })
        });
        const data = await resp.json();
        return data.choices?.[0]?.message?.content || '';
    } catch(e) {
        return '# ' + repoName + '

' + description;
    }
}

async function executeDeploy() {
    const repoName = document.getElementById('deployRepoName').value.trim();

    if (!repoName) { showToast('يرجى إدخال اسم المستودع', 'error'); return; }
    if (generatedFiles.length === 0) { showToast('لا توجد ملفات للنشر', 'error'); return; }

    const enablePages = document.getElementById('deployPages').checked;
    const isPrivate   = enablePages ? false : document.getElementById('deployPrivate').checked;
    const description = document.getElementById('deployDescription').value || 'Generated by Orgteh Code Hub';

    document.getElementById('githubConnected').classList.add('hidden');
    document.getElementById('deployLoading').classList.remove('hidden');
    const statusEl = document.getElementById('deployStatus');

    try {
        // ── [1] توليد README ──
        statusEl.textContent = 'توليد ملف README...';
        const readmeContent = await generateReadme(generatedFiles, repoName, description);
        const allFiles = [...generatedFiles];
        if (readmeContent && !allFiles.find(f => f.path === 'README.md')) {
            allFiles.push({ path: 'README.md', content: readmeContent });
        }

        // ── [2] نشر على GitHub ──
        statusEl.textContent = 'إنشاء المستودع...';
        const response = await fetch('/api/deploy/github', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                repo_name: repoName,
                description: description,
                is_private: isPrivate,
                enable_pages: enablePages,
                files: allFiles
            })
        });

        const result = await response.json();

        if (result.success) {
            document.getElementById('deployLoading').classList.add('hidden');
            document.getElementById('deploySuccess').classList.remove('hidden');
            document.getElementById('repoLink').href = result.repo_url;
            if (result.pages_url) {
                document.getElementById('pagesLink').href = result.pages_url;
                document.getElementById('pagesLink').classList.remove('hidden');
            } else {
                document.getElementById('pagesLink').classList.add('hidden');
            }
            showToast('تم النشر بنجاح!', 'success');
        } else {
            throw new Error(result.error || 'فشل النشر');
        }

    } catch (error) {
        document.getElementById('deployLoading').classList.add('hidden');
        document.getElementById('githubConnected').classList.remove('hidden');
        showToast(error.message, 'error');
    }
}

// تصدير الدالة لاستخدامها في Code Hub
window.setGeneratedFiles = function(files) {
    generatedFiles = files;
    if (files.length > 0) {
        document.getElementById('deployFab').classList.remove('hidden');
    }
};
</script>
